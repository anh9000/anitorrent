name: update-mappings

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: node scripts/build-mappings.js

      - name: Commit updated mapping
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/anilist-to-anidb.json
          if git diff --cached --quiet; then
            echo "No mapping changes."
            exit 0
          fi
          git commit -m "data: update anilist-to-anidb mapping"
          git push
